on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]
      fail-fast: false
    steps:
      - uses: actions/checkout@v5
      - name: 'Read config variables'
        shell: bash
        run: |
          source gradle.properties
          echo "PBLV=$protobufLibraryVersion" >> $GITHUB_ENV
          echo "PBLVP=$protobufLibraryVersionPatch" >> $GITHUB_ENV
      - name: 'Download Protobuf sources'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: >
          gh release download
            --repo protocolbuffers/protobuf v$PBLV
            --pattern protobuf-$PBLV.tar.gz
            --output - | tar -xzf -
      - name: 'Build Protobuf static libraries'
        shell: bash
        run: |
          cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -Dprotobuf_BUILD_TESTS=OFF \
            -G Ninja \
            -S protobuf-$PBLV \
            -B protobuf-build && cd $_
          cmake --build . --verbose
          if [ "${{ runner.os }}" == "Windows" ]; then
            cmake --install .
          else
            sudo cmake --install .
          fi
      - name: 'Build Kts plugin'
        shell: bash
        run: |
          cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DPROTOBUF_VERSION=$PBLV.$PBLVP \
            -B build && cd $_
          cmake --build .
      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: kts-${{ runner.os }}
          path: build/protoc-gen-kts-*
          if-no-files-found: error
          compression-level: 0
          retention-days: 1
  publish:
    if: github.ref_name == 'master'
    runs-on: ubuntu-latest
    needs: [ build ]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v7
        with:
          path: build
      - name: 'Publish to Maven'
        env:
          JRELEASER_MAVENCENTRAL_STAGE: 'UPLOAD'
          JRELEASER_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          JRELEASER_GPG_PUBLIC_KEY: ${{ secrets.GPG_PUBLIC_KEY }}
          JRELEASER_GPG_SECRET_KEY: ${{ secrets.PGP_PRIVATE_KEY }}
          JRELEASER_MAVENCENTRAL_SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          JRELEASER_MAVENCENTRAL_SONATYPE_TOKEN: ${{ secrets.SONATYPE_TOKEN }}
        run: |
          tree .
          gradle wrapper --gradle-version latest
          ./gradlew jreleaserDeploy -PIsRelease=true